<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 页面垂直+水平居中 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            text-align: center;
            font-size: 50px;
            font-family: "SimSun", "宋体", serif;
            color: #2c2c2c;
            text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.25);
            letter-spacing: -2px;
            line-height: 1.6; /* 更舒适的行间距 */
            padding: 20px;
        }

        p {
            margin: 15px 0; /* 诗句之间自然间距 */
        }

        img {
            margin-top: 50px;
            max-width: 100%; /* 图片不超出屏幕 */
            height: auto;
        }
    </style>
</head>
<body>
    <p>别来二月家路长，簌簌冷渐天气凉。</p>
    <p>落木流影窗前过，此站尽处是故乡。</p>

    <!-- 如果你要加图片，把下方注释去掉并替换链接 -->
    <!-- <img src="图片地址.jpg" alt="配图"> -->
</body>
</html>
